# -----------------------------------------------------------------------------
# RENDER DEPLOYMENT CONFIGURATION
# This file automatically deploys the backend Node.js application to Render.
# -----------------------------------------------------------------------------
services:
  - type: web
    name: jobtrackr-backend
    env: node
    rootDir: server
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: PORT
        value: 5000
      - key: MONGO_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_EXPIRE
        value: 7d
      - key: CLIENT_URL
        sync: false
